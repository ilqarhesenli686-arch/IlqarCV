<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cv.Web</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="homepage">
      <nav>
        <a href="#I">Ilqar</a>
        <a href="#about">About</a>
        <a href="#bio">Bio</a>
        <a href="#skills">Skills</a>
        <a href="#experience">Experience</a>
        <a href="#contact">Contact</a>
        <button type="submit" class="button">Download CV</button>
      </nav>

      <main>
        <div id="I" class="I">
          <div class="text">
            <div class="left">
              <h1>
                Hi, I am
                <br />
                <span class="green">Ilgar,</span>
                a full-stack developer.
              </h1>

              <div class="buttons">
                <button type="submit" class="button">Download CV</button>
                <button type="submit" class="button2">Contact Me</button>
              </div>
              <a href="#about" class="scroll-down">
                <span>Scroll down</span>
                <div class="mouse"></div>
              </a>
            </div>
          </div>

          <div class="image">
            <img class="photo" src="images/ilqar.jpeg" alt="" />
          </div>
        </div>
        <div id="about" class="about">
          <div class="about-left">
            <h2 id="green2" class="green">About me</h2>
            <div class="exp">
              <img class="usimg" src="images/boy-child-color-icon.png" alt="" />
              <h1>
                <span class="green3">8 years of software</span> development
                experience
              </h1>
            </div>
            <div class="exp2">
              <img class="usimg2" src="images/projects-icon.svg" alt="" />
              <h1>
                <span class="green3">800+ projects</span>
                completed
              </h1>
            </div>
          </div>
          <div class="right">
            <h1>
              <span id="sual">What are my strongest strengths</span>
              <span class="green3">and technical skills?</span>
            </h1>
          </div>
        </div>
        <div id="bio" class="bio">My bio</div>
        <div id="skills" class="skills">Skills</div>
        <div id="experience" class="experience">Experience</div>
        <div id="contact" class="contact">Contact</div>
      </main>
    </div>
  </body>
</html>
